version: '3.8'
services:
  phavo:
    image: getphavo/phavo:latest
    build: .
    ports:
      - "${PHAVO_PORT:-3000}:3000"
      # HTTPS: configure a reverse proxy (nginx, Caddy)
      # in front of Phavo for TLS termination.
      # Direct TLS support is planned for a future release.
    volumes:
      - phavo-data:/data
    environment:
      # Optional: set explicitly for Kubernetes or multi-instance deployments. If unset,
      # Phavo auto-generates and persists a secret in the data volume on first start.
      # Never use 'change-me'. Back up your data volume to preserve encrypted data.
      # - PHAVO_SECRET=your-random-string-here
      # Set to true if running behind a reverse proxy
      # (nginx, Caddy, Traefik) that sets X-Forwarded-For
      # - PHAVO_TRUST_PROXY=true
      - PHAVO_TLS_MODE=${PHAVO_TLS_MODE:-self-signed}
      - PHAVO_DOMAIN=${PHAVO_DOMAIN:-}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
volumes:
  phavo-data:
